services:
  whisper-api:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./model-cache:/root/.cache/huggingface
    ports:
      - "${PORT:-3373}:${PORT:-3373}"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: all
    environment:
      PORT: "${PORT:-3373}"

volumes:
  model-cache:
